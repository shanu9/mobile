name: Build Android APK

# Builds the AgentScribe Android APK (a thin Capacitor shell that loads the
# hosted web app, same strategy as the Electron desktop build) and attaches it
# to a GitHub Release — so the website's download page can link to it.
#
# Trigger: push a tag `v*` (git tag v0.1.0 && git push --tags) or run manually
# from the Actions tab. Produces an UNSIGNED debug APK (installable via
# "Install unknown apps"), matching the unsigned Windows installer for now; a
# signed Play Store build comes later with the $25 Google Play account.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Add mic + foreground-service permissions and service type
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          # Recording + background-audio permissions. RECORD_AUDIO drives the mic;
          # FOREGROUND_SERVICE(_MICROPHONE) + POST_NOTIFICATIONS + WAKE_LOCK let a
          # microphone foreground service keep capture alive when the screen locks
          # or the user switches to their meeting app.
          perl -0pi -e 's#(\s*)<application#\1<uses-permission android:name="android.permission.RECORD_AUDIO" />\1<uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />\1<uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\1<uses-permission android:name="android.permission.FOREGROUND_SERVICE_MICROPHONE" />\1<uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\1<uses-permission android:name="android.permission.WAKE_LOCK" />\1<application#' "$MANIFEST"
          # Android 14+ (targetSdk 34) requires a TYPED foreground service. The
          # capawesome plugin declares its service with no type, so merge the
          # microphone type onto it. NOTE: this manifest-merge is the part to
          # verify on a real Android 14 device — if record-start crashes, this is
          # where to iterate.
          perl -0pi -e 's#<manifest (?![^>]*xmlns:tools)#<manifest xmlns:tools="http://schemas.android.com/tools" #' "$MANIFEST"
          perl -0pi -e 's#(\s*)(</application>)#\1  <service android:name="io.capawesome.capacitorjs.plugins.foregroundservice.AndroidForegroundService" android:foregroundServiceType="microphone" tools:node="merge" />\1\2#' "$MANIFEST"
          echo "----- manifest (perms + fgs type) -----"
          grep -E "uses-permission|foregroundServiceType|xmlns:tools" "$MANIFEST" || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Collect APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk AgentScribe.apk
          ls -lh AgentScribe.apk

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: AgentScribe.apk
          # Fixed tag so the website's releases/latest/download/AgentScribe.apk
          # link always resolves; each build refreshes this release.
          tag_name: android-latest
          name: AgentScribe Android
          draft: false
          make_latest: true
          body: |
            AgentScribe Android APK (unsigned debug build).
            Install: download, then allow "Install unknown apps" for your browser.
